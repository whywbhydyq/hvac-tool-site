name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate package metadata
        run: node -e "const fs = require('fs'); JSON.parse(fs.readFileSync('package.json', 'utf8')); JSON.parse(fs.readFileSync('package-lock.json', 'utf8')); console.log('package metadata ok');"
